name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova App
        run: |
          cordova create app com.lechugo.maicomelona MaiComelona
          cd app
          cordova platform add android

      - name: Copy Game Files
        run: |
          rm -rf app/www/*
          cp -r * app/www/ || true

      - name: Build APK
        run: |
          cd app
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mai-comelona-apk
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
